name: Checkov Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize]

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: terraform
          framework: terraform
          soft_fail: true